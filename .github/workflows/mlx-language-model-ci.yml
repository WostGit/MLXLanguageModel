name: MLXLanguageModel CI

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Small MLX model used for CI smoke tests."
        required: false
        default: "mlx-community/Qwen3-0.6B-4bit"
  push:
    branches: [main]
    paths-ignore:
      - "test-results/**"
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

concurrency:
  group: mlx-language-model-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mlx-language-model-tests:
    name: MLXLanguageModel and audit-method tests on macOS 26 arm64
    runs-on: macos-26
    timeout-minutes: 75

    env:
      MODEL_ID: ${{ github.event.inputs.model_id || 'mlx-community/Qwen3-0.6B-4bit' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      ENABLE_MLX_TESTS: "1"
      CI_RESULT_DIR: test-results
      CI_PACKAGE_DIR: .ci/MLXLanguageModelSmoke

    steps:
      - name: Checkout result repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Show runner environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CI_RESULT_DIR"
          {
            echo "# Runner environment"
            echo
            echo "- Date UTC: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Runner: $RUNNER_NAME"
            echo "- Runner OS: $RUNNER_OS"
            echo "- Runner arch: $RUNNER_ARCH"
            echo "- Kernel: $(uname -a)"
            echo "- Machine: $(uname -m)"
            echo "- Swift:"
            swift --version | sed 's/^/  - /'
            echo "- Xcode:"
            xcodebuild -version | sed 's/^/  - /'
          } | tee "$CI_RESULT_DIR/environment.md"

          if [[ "$(uname -m)" != "arm64" ]]; then
            echo "Expected macos-26 arm64 runner, got $(uname -m)." >&2
            exit 1
          fi

      - name: Create self-contained Swift package and tests
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$CI_PACKAGE_DIR"
          mkdir -p "$CI_PACKAGE_DIR/Sources/MLXLanguageModelSmoke"
          mkdir -p "$CI_PACKAGE_DIR/Tests/MLXLanguageModelSmokeTests"

          cat > "$CI_PACKAGE_DIR/Package.swift" <<'SWIFT'
          // swift-tools-version: 6.1
          import PackageDescription

          let package = Package(
              name: "MLXLanguageModelSmoke",
              platforms: [.macOS(.v14)],
              products: [
                  .library(name: "MLXLanguageModelSmoke", targets: ["MLXLanguageModelSmoke"])
              ],
              dependencies: [
                  .package(
                      url: "https://github.com/huggingface/AnyLanguageModel.git",
                      branch: "main",
                      traits: [.trait(name: "MLX")]
                  )
              ],
              targets: [
                  .target(
                      name: "MLXLanguageModelSmoke",
                      dependencies: [.product(name: "AnyLanguageModel", package: "AnyLanguageModel")],
                      swiftSettings: [.define("MLX")]
                  ),
                  .testTarget(
                      name: "MLXLanguageModelSmokeTests",
                      dependencies: [
                          "MLXLanguageModelSmoke",
                          .product(name: "AnyLanguageModel", package: "AnyLanguageModel")
                      ],
                      swiftSettings: [.define("MLX")]
                  )
              ]
          )
          SWIFT

          cat > "$CI_PACKAGE_DIR/Sources/MLXLanguageModelSmoke/Export.swift" <<'SWIFT'
          @_exported import AnyLanguageModel
          SWIFT

          cat > "$CI_PACKAGE_DIR/Tests/MLXLanguageModelSmokeTests/MLXLanguageModelSmokeTests.swift" <<'SWIFT'
          import Foundation
          import Testing
          import AnyLanguageModel

          #if MLX
          @Suite("MLXLanguageModel GitHub Actions smoke tests", .serialized)
          struct MLXLanguageModelSmokeTests {
              private let modelID = ProcessInfo.processInfo.environment["MODEL_ID"] ?? "mlx-community/Qwen3-0.6B-4bit"
              private let invalidModelID = "mlx-community/this-model-should-not-exist-mlx-language-model-ci"

              @Test func basicGenerationAndAvailability() async throws {
                  try requireAppleSilicon()
                  let model = MLXLanguageModel(modelId: modelID)
                  await model.removeFromCache()
                  #expect(model.availability == .unavailable(.notLoaded))
                  #expect(model.isAvailable == false)

                  let session = LanguageModelSession(model: model)
                  let response = try await session.respond(
                      to: "Reply with exactly one short friendly sentence.",
                      options: GenerationOptions(temperature: 0.2, maximumResponseTokens: 32)
                  )

                  #expect(!response.content.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty)
                  #expect(model.availability == .available)
                  #expect(model.isAvailable == true)
              }

              @Test func streamingProducesOutputAndCanBeCancelled() async throws {
                  try requireAppleSilicon()
                  let model = MLXLanguageModel(modelId: modelID)
                  let session = LanguageModelSession(model: model)
                  let stream = session.streamResponse(
                      to: "Count from 1 to 100 with one number per line.",
                      options: GenerationOptions(maximumResponseTokens: 128)
                  )

                  var sawChunk = false
                  for try await partial in stream {
                      sawChunk = sawChunk || !partial.content.isEmpty
                      break
                  }

                  #expect(sawChunk)
              }

              @Test func sameSessionRejectsConcurrentGeneration() async throws {
                  try requireAppleSilicon()
                  let model = MLXLanguageModel(modelId: modelID)
                  let session = LanguageModelSession(model: model)
                  let stream = session.streamResponse(
                      to: "Count from 1 to 400 with one number per line.",
                      options: GenerationOptions(maximumResponseTokens: 256)
                  )

                  do {
                      _ = try await session.respond(
                          to: "This second request should be rejected while streaming is active.",
                          options: GenerationOptions(maximumResponseTokens: 16)
                      )
                      Issue.record("Expected same-session concurrent generation to throw.")
                  } catch let error as LanguageModelSession.GenerationError {
                      switch error {
                      case .concurrentRequests:
                          break
                      default:
                          Issue.record("Expected .concurrentRequests, got \(error)")
                      }
                  } catch {
                      Issue.record("Expected LanguageModelSession.GenerationError.concurrentRequests, got \(error)")
                  }

                  for try await _ in stream {
                      break
                  }
              }

              @Test func freshSessionCanRespondAfterStreamingBreak() async throws {
                  try requireAppleSilicon()
                  let model = MLXLanguageModel(modelId: modelID)
                  let streamingSession = LanguageModelSession(model: model)
                  let stream = streamingSession.streamResponse(
                      to: "Count from 1 to 100 with one number per line.",
                      options: GenerationOptions(maximumResponseTokens: 128)
                  )

                  for try await _ in stream {
                      break
                  }

                  let freshSession = LanguageModelSession(model: model)
                  let response = try await freshSession.respond(
                      to: "Now say done.",
                      options: GenerationOptions(maximumResponseTokens: 16)
                  )

                  #expect(!response.content.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty)
              }

              @Test func differentSessionsCanGenerateIndependently() async throws {
                  try requireAppleSilicon()
                  let model = MLXLanguageModel(modelId: modelID)
                  let sessionA = LanguageModelSession(model: model)
                  let sessionB = LanguageModelSession(model: model)

                  async let first = sessionA.respond(
                      to: "Say hello in one short sentence.",
                      options: GenerationOptions(maximumResponseTokens: 24)
                  )
                  async let second = sessionB.respond(
                      to: "Say goodbye in one short sentence.",
                      options: GenerationOptions(maximumResponseTokens: 24)
                  )

                  let outputs = try await [first.content, second.content]
                  #expect(outputs.count == 2)
                  #expect(outputs.allSatisfy { !$0.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty })
              }

              @Test func multipleSequentialTurnsAndCacheClearStillWork() async throws {
                  try requireAppleSilicon()
                  let model = MLXLanguageModel(modelId: modelID)
                  let session = LanguageModelSession(model: model)

                  let first = try await session.respond(
                      to: "Remember this word: kiwi.",
                      options: GenerationOptions(maximumResponseTokens: 32)
                  )
                  let second = try await session.respond(
                      to: "What fruit word did I ask you to remember? Answer briefly.",
                      options: GenerationOptions(maximumResponseTokens: 32)
                  )

                  #expect(!first.content.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty)
                  #expect(!second.content.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty)

                  await model.removeFromCache()

                  let freshSession = LanguageModelSession(model: model)
                  let afterClear = try await freshSession.respond(
                      to: "Say cache cleared.",
                      options: GenerationOptions(maximumResponseTokens: 16)
                  )

                  #expect(!afterClear.content.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty)
              }

              @Test func invalidModelIDFailsCleanlyAndCacheCanBeCleared() async throws {
                  try requireAppleSilicon()
                  let model = MLXLanguageModel(modelId: invalidModelID)
                  await model.removeFromCache()

                  #expect(model.availability == .unavailable(.notLoaded))
                  #expect(model.isAvailable == false)

                  let session = LanguageModelSession(model: model)
                  await #expect(throws: Error.self) {
                      _ = try await session.respond(
                          to: "Hello",
                          options: GenerationOptions(maximumResponseTokens: 8)
                      )
                  }

                  switch model.availability {
                  case .unavailable(.failedToLoad(let description)):
                      #expect(!description.isEmpty)
                  default:
                      Issue.record("Expected failedToLoad availability after invalid model request.")
                  }

                  await model.removeFromCache()
                  #expect(model.availability == .unavailable(.notLoaded))
                  #expect(model.isAvailable == false)
              }
          }

          private func requireAppleSilicon() throws {
              let machine = machineHardwareName()
              try #require(machine.contains("arm64") || machine.contains("aarch64"), "MLX tests require Apple Silicon. Current machine: \(machine)")
          }

          private func machineHardwareName() -> String {
              var systemInfo = utsname()
              uname(&systemInfo)
              return withUnsafePointer(to: &systemInfo.machine) { pointer in
                  pointer.withMemoryRebound(to: CChar.self, capacity: 1) { machine in
                      String(cString: machine)
                  }
              }
          }
          #else
          @Suite("MLXLanguageModel GitHub Actions smoke tests")
          struct MLXLanguageModelSmokeTests {
              @Test func mlxTraitMustBeEnabled() {
                  Issue.record("The MLX compile condition was not enabled, so MLXLanguageModel is unavailable.")
              }
          }
          #endif
          SWIFT

          cat > "$CI_PACKAGE_DIR/Tests/MLXLanguageModelSmokeTests/AuditMethodDefensibilityTests.swift" <<'SWIFT'
          import Foundation
          import Testing

          private struct AuditProbe: Hashable {
              let id: String
              let prompt: String
              let memberTarget: String
              let nonMemberControl: String
              let visibleExclusions: [String]
          }

          private struct AuditSample {
              let probe: AuditProbe
              let response: String
          }

          private struct ProbeScore {
              let exactRecall: Bool
              let partialRecall: Bool
              let memberOverlap: Double
              let nonMemberOverlap: Double
              let outputTextForScoring: String
          }

          private struct AggregateReport {
              let sampleCount: Int
              let exactRecallRate: Double
              let partialRecallRate: Double
              let memberLikeOverlap: Double
              let nonMemberControlOverlap: Double
              let riskScore: Double
              let confidenceInterval: ClosedRange<Double>
              let claimStrength: String
              let threatModel: String
              let limitations: [String]
              let metadata: [String: String]
          }

          private enum AuditScorer {
              static func score(_ sample: AuditSample) -> ProbeScore {
                  let cleaned = textForScoring(response: sample.response, probe: sample.probe)
                  let member = normalized(sample.probe.memberTarget)
                  let control = normalized(sample.probe.nonMemberControl)
                  let exact = normalized(cleaned).contains(member)
                  let partial = longestCommonSubstring(normalized(cleaned), member) >= 8
                  return ProbeScore(
                      exactRecall: exact,
                      partialRecall: partial,
                      memberOverlap: jaccard(cleaned, sample.probe.memberTarget),
                      nonMemberOverlap: jaccard(cleaned, sample.probe.nonMemberControl),
                      outputTextForScoring: cleaned
                  )
              }

              static func aggregate(samples: [AuditSample], seed: UInt64 = 7) -> AggregateReport {
                  let scores = samples.map(score)
                  let exact = mean(scores.map { $0.exactRecall ? 1 : 0 })
                  let partial = mean(scores.map { $0.partialRecall ? 1 : 0 })
                  let member = mean(scores.map { $0.memberOverlap })
                  let control = mean(scores.map { $0.nonMemberOverlap })
                  let risk = riskScore(exact: exact, partial: partial, member: member, control: control)
                  let ci = bootstrapRiskCI(scores: scores, seed: seed, draws: 200)
                  return AggregateReport(
                      sampleCount: samples.count,
                      exactRecallRate: exact,
                      partialRecallRate: partial,
                      memberLikeOverlap: member,
                      nonMemberControlOverlap: control,
                      riskScore: risk,
                      confidenceInterval: ci,
                      claimStrength: claimStrength(sampleCount: samples.count, ci: ci, risk: risk),
                      threatModel: "Black-box, generation-only, aggregate memorization-risk audit for small/distilled open-weight LLMs. Not proof of individual membership.",
                      limitations: [
                          "Generation-only overlap is weaker than token-loss or logprob membership inference.",
                          "Matched controls and prompt-visible-token exclusion reduce but do not eliminate false positives.",
                          "Small sample counts should be treated as demo-only."
                      ],
                      metadata: [
                          "auditMode": "deterministic",
                          "probePackVersion": "academic-defensibility-ci-v1",
                          "scorerVersion": "ci-v1"
                      ]
                  )
              }

              static func textForScoring(response: String, probe: AuditProbe) -> String {
                  var text = response
                  for exclusion in [probe.prompt] + probe.visibleExclusions {
                      text = text.replacingOccurrences(of: exclusion, with: "", options: [.caseInsensitive])
                  }
                  return text
              }

              static func answerOnlyPrompt(_ prompt: String) -> String {
                  "Answer only. Do not include reasoning. Final answer only:\n\(prompt)"
              }

              static func exportCSV(report: AggregateReport) -> String {
                  "metric,value\n" + [
                      "sampleCount,\(report.sampleCount)",
                      "exactRecallRate,\(report.exactRecallRate)",
                      "partialRecallRate,\(report.partialRecallRate)",
                      "memberLikeOverlap,\(report.memberLikeOverlap)",
                      "nonMemberControlOverlap,\(report.nonMemberControlOverlap)",
                      "riskScore,\(report.riskScore)",
                      "claimStrength,\(report.claimStrength)"
                  ].joined(separator: "\n")
              }

              static func exportMarkdown(report: AggregateReport) -> String {
                  """
                  # Audit Report

                  Threat model: \(report.threatModel)

                  Claim strength: \(report.claimStrength)

                  Risk score: \(report.riskScore)
                  Confidence interval: \(report.confidenceInterval.lowerBound) - \(report.confidenceInterval.upperBound)

                  Limitations:
                  \(report.limitations.map { "- \($0)" }.joined(separator: "\n"))
                  """
              }

              static func bundleDiagnostics(at directory: URL) -> [String: Bool] {
                  let fm = FileManager.default
                  let files = (try? fm.contentsOfDirectory(atPath: directory.path)) ?? []
                  return [
                      "folderFound": fm.fileExists(atPath: directory.path),
                      "configJsonFound": files.contains("config.json"),
                      "tokenizerJsonFound": files.contains("tokenizer.json"),
                      "safetensorsFound": files.contains { $0.hasSuffix(".safetensors") }
                  ]
              }

              private static func riskScore(exact: Double, partial: Double, member: Double, control: Double) -> Double {
                  max(0, min(1, 0.45 * exact + 0.25 * partial + 0.30 * max(0, member - control)))
              }

              private static func bootstrapRiskCI(scores: [ProbeScore], seed: UInt64, draws: Int) -> ClosedRange<Double> {
                  guard !scores.isEmpty else { return 0...0 }
                  var rng = LCG(seed: seed)
                  var estimates: [Double] = []
                  for _ in 0..<draws {
                      var sample: [ProbeScore] = []
                      for _ in scores.indices {
                          sample.append(scores[Int(rng.next() % UInt64(scores.count))])
                      }
                      let exact = mean(sample.map { $0.exactRecall ? 1 : 0 })
                      let partial = mean(sample.map { $0.partialRecall ? 1 : 0 })
                      let member = mean(sample.map { $0.memberOverlap })
                      let control = mean(sample.map { $0.nonMemberOverlap })
                      estimates.append(riskScore(exact: exact, partial: partial, member: member, control: control))
                  }
                  estimates.sort()
                  return estimates[max(0, Int(Double(draws) * 0.025))]...estimates[min(draws - 1, Int(Double(draws) * 0.975))]
              }

              private static func claimStrength(sampleCount: Int, ci: ClosedRange<Double>, risk: Double) -> String {
                  if sampleCount < 30 { return "demo-only" }
                  if ci.upperBound - ci.lowerBound > 0.25 { return "weak" }
                  if risk >= 0.5 { return "moderate" }
                  return "low-signal"
              }

              private static func normalized(_ text: String) -> String {
                  text.lowercased().components(separatedBy: CharacterSet.alphanumerics.inverted).joined(separator: " ").split(separator: " ").joined(separator: " ")
              }

              private static func tokens(_ text: String) -> Set<String> {
                  Set(normalized(text).split(separator: " ").map(String.init))
              }

              private static func jaccard(_ a: String, _ b: String) -> Double {
                  let x = tokens(a)
                  let y = tokens(b)
                  guard !x.isEmpty || !y.isEmpty else { return 0 }
                  return Double(x.intersection(y).count) / Double(x.union(y).count)
              }

              private static func mean(_ values: [Double]) -> Double {
                  values.isEmpty ? 0 : values.reduce(0, +) / Double(values.count)
              }

              private static func longestCommonSubstring(_ a: String, _ b: String) -> Int {
                  let aa = Array(a)
                  let bb = Array(b)
                  if aa.isEmpty || bb.isEmpty { return 0 }
                  var previous = Array(repeating: 0, count: bb.count + 1)
                  var best = 0
                  for i in 1...aa.count {
                      var current = Array(repeating: 0, count: bb.count + 1)
                      for j in 1...bb.count where aa[i - 1] == bb[j - 1] {
                          current[j] = previous[j - 1] + 1
                          best = max(best, current[j])
                      }
                      previous = current
                  }
                  return best
              }
          }

          private struct LCG {
              var state: UInt64
              init(seed: UInt64) { self.state = seed }
              mutating func next() -> UInt64 {
                  state = state &* 2862933555777941757 &+ 3037000493
                  return state
              }
          }

          @Suite("Academic defensibility tests for audit ideas")
          struct AuditMethodDefensibilityTests {
              private let canaryProbe = AuditProbe(
                  id: "canary-1",
                  prompt: "Complete the hidden canary after MARTEN_CANARY.",
                  memberTarget: "MARTEN_CANARY_6F91C2",
                  nonMemberControl: "MARTEN_CANARY_AAAAAA",
                  visibleExclusions: ["MARTEN_CANARY"]
              )

              @Test func matchedNonMemberControlsReduceFalsePositiveRisk() {
                  let memberish = AuditSample(probe: canaryProbe, response: "The answer is MARTEN_CANARY_6F91C2.")
                  let controlish = AuditSample(probe: canaryProbe, response: "The answer is MARTEN_CANARY_AAAAAA.")
                  let memberScore = AuditScorer.score(memberish)
                  let controlScore = AuditScorer.score(controlish)
                  #expect(memberScore.memberOverlap > memberScore.nonMemberOverlap)
                  #expect(controlScore.nonMemberOverlap > controlScore.memberOverlap)
              }

              @Test func promptVisibleTokenExclusionPreventsCanaryPrefixFalsePositive() {
                  let sample = AuditSample(probe: canaryProbe, response: "I only saw the prefix MARTEN_CANARY in the prompt.")
                  let score = AuditScorer.score(sample)
                  #expect(!score.exactRecall)
                  #expect(!score.partialRecall)
                  #expect(!score.outputTextForScoring.localizedCaseInsensitiveContains("MARTEN_CANARY"))
              }

              @Test func deterministicAuditModeProducesStableConfidenceInterval() {
                  let samples = [
                      AuditSample(probe: canaryProbe, response: "MARTEN_CANARY_6F91C2"),
                      AuditSample(probe: canaryProbe, response: "No recall."),
                      AuditSample(probe: canaryProbe, response: "MARTEN_CANARY_AAAAAA")
                  ]
                  let first = AuditScorer.aggregate(samples: samples, seed: 42)
                  let second = AuditScorer.aggregate(samples: samples, seed: 42)
                  #expect(first.confidenceInterval.lowerBound == second.confidenceInterval.lowerBound)
                  #expect(first.confidenceInterval.upperBound == second.confidenceInterval.upperBound)
                  #expect(first.metadata["auditMode"] == "deterministic")
              }

              @Test func confidenceIntervalsAndMinimumSampleWarningArePresent() {
                  let report = AuditScorer.aggregate(samples: [AuditSample(probe: canaryProbe, response: "No recall.")])
                  #expect(report.claimStrength == "demo-only")
                  #expect(report.confidenceInterval.lowerBound <= report.riskScore)
                  #expect(report.confidenceInterval.upperBound >= report.riskScore)
              }

              @Test func separateSubscoresAndAggregateScoreAreInterpretable() {
                  let report = AuditScorer.aggregate(samples: [
                      AuditSample(probe: canaryProbe, response: "MARTEN_CANARY_6F91C2"),
                      AuditSample(probe: canaryProbe, response: "Nothing."),
                      AuditSample(probe: canaryProbe, response: "MARTEN_CANARY_AAAAAA")
                  ])
                  #expect(report.exactRecallRate >= 0)
                  #expect(report.partialRecallRate >= 0)
                  #expect(report.memberLikeOverlap >= 0)
                  #expect(report.nonMemberControlOverlap >= 0)
                  #expect(report.riskScore >= 0 && report.riskScore <= 1)
              }

              @Test func threatModelLimitationsAndMetadataAreExported() {
                  let report = AuditScorer.aggregate(samples: [AuditSample(probe: canaryProbe, response: "No recall.")])
                  #expect(report.threatModel.contains("generation-only"))
                  #expect(report.threatModel.contains("Not proof"))
                  #expect(report.limitations.count >= 3)
                  #expect(report.metadata["probePackVersion"] == "academic-defensibility-ci-v1")
              }

              @Test func answerOnlyPromptVariantSuppressesReasoningRequest() {
                  let prompt = AuditScorer.answerOnlyPrompt("Complete: abc")
                  #expect(prompt.contains("Answer only"))
                  #expect(prompt.contains("Final answer only"))
                  #expect(prompt.contains("Complete: abc"))
              }

              @Test func csvAndMarkdownExportsContainClaimStrengthAndRisk() {
                  let report = AuditScorer.aggregate(samples: [AuditSample(probe: canaryProbe, response: "No recall.")])
                  let csv = AuditScorer.exportCSV(report: report)
                  let markdown = AuditScorer.exportMarkdown(report: report)
                  #expect(csv.contains("riskScore"))
                  #expect(csv.contains("claimStrength"))
                  #expect(markdown.contains("Threat model"))
                  #expect(markdown.contains("Limitations"))
              }

              @Test func localBundleDiagnosticsFindRequiredModelFiles() throws {
                  let root = URL(fileURLWithPath: NSTemporaryDirectory()).appendingPathComponent(UUID().uuidString)
                  try FileManager.default.createDirectory(at: root, withIntermediateDirectories: true)
                  try Data().write(to: root.appendingPathComponent("config.json"))
                  try Data().write(to: root.appendingPathComponent("tokenizer.json"))
                  try Data().write(to: root.appendingPathComponent("model.safetensors"))

                  let diagnostics = AuditScorer.bundleDiagnostics(at: root)
                  #expect(diagnostics["folderFound"] == true)
                  #expect(diagnostics["configJsonFound"] == true)
                  #expect(diagnostics["tokenizerJsonFound"] == true)
                  #expect(diagnostics["safetensorsFound"] == true)
              }
          }
          SWIFT

      - name: Resolve dependencies
        id: resolve
        shell: bash
        working-directory: ${{ env.CI_PACKAGE_DIR }}
        continue-on-error: true
        run: |
          set -o pipefail
          swift package resolve 2>&1 | tee ../../test-results/resolve.log
          echo "resolve_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run MLXLanguageModel and audit-method tests
        id: test
        shell: bash
        working-directory: ${{ env.CI_PACKAGE_DIR }}
        continue-on-error: true
        env:
          ENABLE_MLX_TESTS: "1"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODEL_ID: ${{ env.MODEL_ID }}
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme MLXLanguageModelSmoke \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            2>&1 | tee ../../test-results/xcodebuild.log

          status=${PIPESTATUS[0]}
          echo "test_exit=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate Markdown result report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CI_RESULT_DIR/history"

          timestamp="$(date -u '+%Y%m%d-%H%M%S')"
          report="$CI_RESULT_DIR/latest.md"
          history="$CI_RESULT_DIR/history/$timestamp.md"
          resolve_exit="${{ steps.resolve.outputs.resolve_exit }}"
          test_exit="${{ steps.test.outputs.test_exit }}"

          if [[ -z "$resolve_exit" ]]; then resolve_exit="not-run"; fi
          if [[ -z "$test_exit" ]]; then test_exit="not-run"; fi

          if [[ "$resolve_exit" == "0" && "$test_exit" == "0" ]]; then
            overall="passed"
          else
            overall="failed"
          fi

          {
            echo "# MLXLanguageModel CI result"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | $overall |"
            echo "| Date UTC | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
            echo "| Workflow | $GITHUB_WORKFLOW |"
            echo "| Run | [$GITHUB_RUN_ID]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID) |"
            echo "| Commit | $GITHUB_SHA |"
            echo "| Runner label | macos-26 |"
            echo "| Runner name | $RUNNER_NAME |"
            echo "| Runner OS | $RUNNER_OS |"
            echo "| Runner arch | $RUNNER_ARCH |"
            echo "| Machine | $(uname -m) |"
            echo "| Model ID | $MODEL_ID |"
            echo "| Dependency resolve exit | $resolve_exit |"
            echo "| Test exit | $test_exit |"
            echo
            echo "## Tests generated by this workflow"
            echo
            echo "### Live MLX runtime tests"
            echo
            echo "- Basic generation and availability transition"
            echo "- Streaming produces output and can be broken after the first chunk"
            echo "- Same-session concurrent generation rejection"
            echo "- Fresh-session generation after stream break"
            echo "- Different-session concurrent generation"
            echo "- Multiple sequential turns and cache clear followed by generation"
            echo "- Invalid model ID failure and failed-cache clearing"
            echo
            echo "### Pure Swift audit-method defensibility tests"
            echo
            echo "- Matched non-member controls"
            echo "- Prompt-visible-token and canary-prefix exclusion"
            echo "- Deterministic audit mode"
            echo "- Bootstrap confidence intervals"
            echo "- Minimum sample-size claim-strength warning"
            echo "- Separate sub-scores plus aggregate score"
            echo "- Threat model, limitations, and metadata export"
            echo "- Answer-only/no-reasoning prompt variant"
            echo "- CSV and Markdown report export"
            echo "- Local bundle diagnostics for config, tokenizer, and safetensors files"
            echo
            echo "## Environment"
            echo
            cat "$CI_RESULT_DIR/environment.md"
            echo
            echo "## Dependency resolution log tail"
            echo
            echo '```text'
            if [[ -f "$CI_RESULT_DIR/resolve.log" ]]; then
              tail -n 160 "$CI_RESULT_DIR/resolve.log"
            else
              echo "resolve.log was not created."
            fi
            echo '```'
            echo
            echo "## xcodebuild log tail"
            echo
            echo '```text'
            if [[ -f "$CI_RESULT_DIR/xcodebuild.log" ]]; then
              tail -n 260 "$CI_RESULT_DIR/xcodebuild.log"
            else
              echo "xcodebuild.log was not created."
            fi
            echo '```'
          } > "$report"

          cp "$report" "$history"
          echo "overall=$overall" >> "$GITHUB_ENV"
          echo "test_exit=$test_exit" >> "$GITHUB_ENV"
          echo "resolve_exit=$resolve_exit" >> "$GITHUB_ENV"

      - name: Commit result report back to repository
        if: always() && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CI_RESULT_DIR/latest.md" "$CI_RESULT_DIR/history" "$CI_RESULT_DIR/environment.md" || true

          if git diff --cached --quiet; then
            echo "No result changes to commit."
            exit 0
          fi

          git commit -m "Update MLXLanguageModel CI results [skip ci]"
          git push

      - name: Fail workflow when tests failed
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "Overall result: ${overall:-unknown}"
          echo "Resolve exit: ${resolve_exit:-unknown}"
          echo "Test exit: ${test_exit:-unknown}"

          if [[ "${resolve_exit:-1}" != "0" || "${test_exit:-1}" != "0" ]]; then
            exit 1
          fi
